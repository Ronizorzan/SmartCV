[theme]
# Tema base
base = "dark"  # Modo escuro

# Paleta de cores
primaryColor = "#4DB6FF"           # Azul claro para destaque
backgroundColor = "#121212"        # Fundo principal escuro
secondaryBackgroundColor = "#1E1E1E"  # Fundo de painéis e caixas
textColor = "#E0E0E0"              # Texto claro para contraste

# Tipografia
font = "sans serif"  # Opções: "sans serif", "serif", "monospace"


[theme]
# Tema base
base = "light"  # Pode ser "light" ou "dark"

# Paleta de cores
primaryColor = "#1F77B4"           # Azul corporativo (botões, sliders, links)
backgroundColor = "#F9FAFB"        # Fundo principal claro
secondaryBackgroundColor = "#FFFFFF"  # Fundo de painéis e caixas
textColor = "#1A1A1A"              # Texto principal (alto contraste)

# Tipografia
font = "sans serif"  # Opções: "sans serif", "serif", "monospace"


